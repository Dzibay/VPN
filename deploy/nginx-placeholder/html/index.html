<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Скоро запустимся</title>
    <style>
      :root {
        --bg: #0b0d12;
        --panel: #12151d;
        --border: #232734;
        --text: #e8ecf1;
        --muted: #8b93a3;
        --accent: #4c8bf5;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        background:
          radial-gradient(circle at 20% 20%, rgba(76,139,245,0.15), transparent 40%),
          radial-gradient(circle at 80% 60%, rgba(106,165,255,0.1), transparent 40%),
          var(--bg);
        color: var(--text);
        font-family: 'Manrope', -apple-system, Segoe UI, Roboto, system-ui, sans-serif;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        max-width: 520px;
        text-align: center;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 40px 32px;
        box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      }
      .dot {
        width: 14px; height: 14px; border-radius: 50%;
        background: var(--accent);
        display: inline-block; margin-right: 8px;
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.4); opacity: 0.4; }
      }
      h1 {
        font-size: 28px;
        margin: 12px 0 8px;
        letter-spacing: -0.02em;
      }
      p {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
      }
      .brand {
        color: var(--accent);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="dot"></span>
      <span class="brand">In progress</span>
      <h1>Скоро запустимся</h1>
      <p>
        Сайт находится в разработке.<br />
        Мы уже готовим для вас быстрый и приватный VPN.
      </p>
    </main>
  </body>
</html>
