# Продакшен-стек: Caddy (TLS) → Nginx (SPA + /api) → FastAPI; Prometheus; Postgres; Redis; RQ worker.
# Запуск из каталога deploy/:
#   cp env.production.example .env   # JWT, POSTGRES_PASSWORD, SITE_ADDRESS, TELEGRAM_BOT_USERNAME
#   mkdir -p secrets/ssh  # положите ключ для PROVISION_SSH_KEY_PATH
#   docker compose up -d --build
#
# Метрики: отредактируйте prometheus/targets/node_exporter.json (targets как в servers.prometheus_instance).

name: vpn

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vpn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-vpn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ../database/migrate.sql:/docker-entrypoint-initdb.d/02-migrate.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    # --workers 2: defense-in-depth поверх async-стека. Один воркер всё ещё может
    # деградировать (баг, OOM-killer внутри потока, зависший syscall) — второй продолжит
    # обслуживать запросы. На небольшом VPS это меньше 100 МБ дополнительной памяти.
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "2"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3
    # Метка для autoheal: контейнер с label "autoheal=true" автоматически перезапускается,
    # как только healthcheck перешёл в unhealthy (см. сервис ``autoheal`` ниже).
    labels:
      - autoheal=true
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-vpn}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-vpn}
      DATABASE_URL: ""
      REDIS_URL: redis://redis:6379/0
      PROMETHEUS_BASE_URL: http://prometheus:9090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [internal]
    # Проброс только для отладки (в продакшене закомментируйте):
    # ports:
    #   - "127.0.0.1:8000:8000"

  # autoheal перезапускает любой контейнер из стека, перешедший в unhealthy. Без него
  # api с зависшим event loop остаётся мёртвым до ручного `docker restart` — ровно
  # симптом, с которого начался этот рефакторинг.
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: "10"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "worker.run"]
    # Нет HTTP на 8000 — наследованный из образа healthcheck через curl всегда бы был failed.
    healthcheck:
      disable: true
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-vpn}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-vpn}
      DATABASE_URL: ""
      REDIS_URL: redis://redis:6379/0
      PROMETHEUS_BASE_URL: http://prometheus:9090
      PROVISION_SSH_KEY_PATH: ${PROVISION_SSH_KEY_PATH:-/ssh/id_ed25519}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Образ запускается под UID/GID 10001 (см. backend/Dockerfile). Чтобы worker мог
      # читать ключ через openssh-client, заранее на хосте:
      #   sudo chown -R 10001:10001 ./secrets/ssh && chmod 0700 ./secrets/ssh && chmod 0600 ./secrets/ssh/*
      # Альтернатива — переопределить пользователя сервиса (например, ``user: "1000:1000"``).
      - ${PROVISION_SSH_KEYS:-./secrets/ssh}:/ssh:ro
    networks: [internal]

  # Отдельный процесс с тремя периодическими корутинами (раньше жили в lifespan API):
  # сбор трафика Xray, sync servers.load_percent из Prometheus, ежедневный sync клиентов.
  # Тот же образ, что у api/worker — отличается только командой.
  scheduler:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler.run"]
    healthcheck:
      disable: true
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-vpn}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-vpn}
      DATABASE_URL: ""
      REDIS_URL: redis://redis:6379/0
      PROMETHEUS_BASE_URL: http://prometheus:9090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [internal]

  prometheus:
    image: prom/prometheus:v2.53.3
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/sd_bearer.txt:/etc/prometheus/sd_bearer.txt:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prometheus_data:/prometheus
    networks: [internal]
    # Доступ с хоста только для отладки:
    ports:
      - "127.0.0.1:9090:9090"

  nginx:
    build:
      context: ..
      dockerfile: deploy/nginx/Dockerfile
      args:
        SITE_ADDRESS: ${SITE_ADDRESS:?SITE_ADDRESS is required (e.g. vpn.example.com)}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks: [internal]

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?SITE_ADDRESS is required (e.g. vpn.example.com)}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  caddy_data:
  caddy_config:
