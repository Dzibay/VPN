# Продакшен-стек: Caddy (TLS) → Nginx (SPA + /api) → FastAPI; Prometheus; Postgres; Redis; RQ worker.
# Запуск из каталога deploy/:
#   cp env.production.example .env   # SITE_ADDRESS=основной домен, SITE_EXTRA_ADDRESSES=старые (301 → основной)
#   Для метрик в админке задайте в .env PROMETHEUS_SD_TOKEN (одна строка) — API и Prometheus подхватят его сами.
#   mkdir -p secrets/ssh  # положите ключ для PROVISION_SSH_KEY_PATH
#   docker compose up -d --build
#
# Перенос только PostgreSQL на новый сервер:
#   Старый: ./scripts/db-dump.sh && scp vpn-db-*.sql.gz user@new:/path/VPN/deploy/
#   Новый:  cp env.production.example .env, docker volume create …, compose up postgres,
#           ./scripts/db-restore.sh vpn-db-*.sql.gz && docker compose up -d --build
#
# Ежедневный бэкап БД на Яндекс Диск через WebDAV (профиль backup, см. сервис db-backup):
#   docker compose --profile backup up -d --build db-backup
# В .env: логин Яндекса и пароль приложения (https://id.yandex.ru/security → пароли приложений → для WebDAV/Диска).
#   YANDEX_DISK_USER=user@yandex.ru
#   YANDEX_DISK_PASSWORD=...
#   YANDEX_DISK_FOLDER=vpn-db-backups   # опционально, папка в корне Диска
#
# Метрики: отредактируйте prometheus/targets/node_exporter.json (targets как в servers.prometheus_instance).

name: vpn

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vpn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-vpn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ../database/migrate.sql:/docker-entrypoint-initdb.d/02-migrate.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [internal]

  # Ежедневный pg_dump → gzip → Яндекс Диск (WebDAV). Не поднимается без --profile backup.
  db-backup:
    profiles: ["backup"]
    build:
      context: ./db-backup
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-vpn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vpn}
      YANDEX_DISK_USER: ${YANDEX_DISK_USER:-}
      YANDEX_DISK_PASSWORD: ${YANDEX_DISK_PASSWORD:-}
      YANDEX_DISK_FOLDER: ${YANDEX_DISK_FOLDER:-vpn-db-backups}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    # --workers 4: баланс параллелизма и лимита PG (4×20 async conn ≈ 80). Больше workers
    # без роста max_connections Postgres → QueuePool timeout на каждом процессе.
    command:
      - /app/scripts/docker_entrypoint_api.sh
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "4"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3
    # Метка для autoheal: контейнер с label "autoheal=true" автоматически перезапускается,
    # как только healthcheck перешёл в unhealthy (см. сервис ``autoheal`` ниже).
    labels:
      - autoheal=true
    env_file:
      - .env
    environment:
      SKIP_ENSURE_SCHEMA: "1"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-vpn}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-vpn}
      DATABASE_URL: ""
      REDIS_URL: redis://redis:6379/0
      PROMETHEUS_BASE_URL: http://prometheus:9090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [internal]
    # Проброс только для отладки (в продакшене закомментируйте):
    # ports:
    #   - "127.0.0.1:8000:8000"

  # autoheal перезапускает любой контейнер из стека, перешедший в unhealthy. Без него
  # api с зависшим event loop остаётся мёртвым до ручного `docker restart` — ровно
  # симптом, с которого начался этот рефакторинг.
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: "10"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "worker.run"]
    # Нет HTTP на 8000 — наследованный из образа healthcheck через curl всегда бы был failed.
    healthcheck:
      disable: true
    env_file:
      - .env
    environment:
      SKIP_ENSURE_SCHEMA: "1"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-vpn}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-vpn}
      DATABASE_URL: ""
      REDIS_URL: redis://redis:6379/0
      PROMETHEUS_BASE_URL: http://prometheus:9090
      PROVISION_SSH_KEY_PATH: ${PROVISION_SSH_KEY_PATH:-/ssh/id_ed25519}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      # Образ запускается под UID/GID 10001 (см. backend/Dockerfile). Чтобы worker мог
      # читать ключ через openssh-client, заранее на хосте:
      #   sudo chown -R 10001:10001 ./secrets/ssh && chmod 0700 ./secrets/ssh && chmod 0600 ./secrets/ssh/*
      # Альтернатива — переопределить пользователя сервиса (например, ``user: "1000:1000"``).
      - ${PROVISION_SSH_KEYS:-./secrets/ssh}:/ssh:ro
    networks: [internal]

  # Два планировщика с одним образом: инфраструктура (Xray, Prometheus, TCP) и Telegram-
  # задачи об окончании подписки. Роль задаёт SCHEDULER_ROLE (см. app/scheduler/run.py).
  scheduler-periodic:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler.run"]
    healthcheck:
      disable: true
    env_file:
      - .env
    environment:
      SKIP_ENSURE_SCHEMA: "1"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-vpn}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-vpn}
      DATABASE_URL: ""
      REDIS_URL: redis://redis:6379/0
      PROMETHEUS_BASE_URL: http://prometheus:9090
      SCHEDULER_ROLE: periodic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks: [internal]

  scheduler-telegram-notify:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler.run"]
    healthcheck:
      disable: true
    env_file:
      - .env
    environment:
      SKIP_ENSURE_SCHEMA: "1"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-vpn}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-vpn}
      DATABASE_URL: ""
      REDIS_URL: redis://redis:6379/0
      PROMETHEUS_BASE_URL: http://prometheus:9090
      SCHEDULER_ROLE: telegram_notify
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks: [internal]

  prometheus:
    image: prom/prometheus:v2.53.3
    restart: unless-stopped
    environment:
      PROMETHEUS_SD_TOKEN: ${PROMETHEUS_SD_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["/bin/sh", "/etc/prometheus/docker-entrypoint.sh"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/docker-entrypoint.sh:/etc/prometheus/docker-entrypoint.sh:ro
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prometheus_data:/prometheus
    networks: [internal]
    # Доступ с хоста только для отладки:
    ports:
      - "127.0.0.1:9090:9090"

  nginx:
    build:
      context: ..
      dockerfile: deploy/nginx/Dockerfile
      args:
        SITE_ADDRESS: ${SITE_ADDRESS:?SITE_ADDRESS is required (e.g. vpn.example.com)}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks: [internal]

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/etc/caddy/docker-entrypoint.sh"]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?SITE_ADDRESS is required (e.g. vpn.example.com)}
      SITE_EXTRA_ADDRESSES: ${SITE_EXTRA_ADDRESSES:-}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/docker-entrypoint.sh:/etc/caddy/docker-entrypoint.sh:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx
    networks: [internal]

networks:
  internal:
    driver: bridge

# Существующие тома на хосте (например docker volume create … или старый compose без labels):
# помечаем external, иначе WARN «already exists but was not created by Docker Compose».
volumes:
  postgres_data:
    external: true
    name: vpn_postgres_data
  redis_data:
    external: true
    name: vpn_redis_data
  prometheus_data:
    external: true
    name: vpn_prometheus_data
  caddy_data:
    external: true
    name: vpn_caddy_data
  caddy_config:
    external: true
    name: vpn_caddy_config
