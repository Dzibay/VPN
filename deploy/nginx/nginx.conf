worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # За TLS-терминацией (Cloudflare и т.д.) nginx часто видит только HTTP. Нельзя подставлять
    # $scheme в X-Forwarded-Proto — бэкенд соберёт http://… в 302, браузер на https://… → цикл редиректов.
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        location /api {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_read_timeout 120s;
            proxy_connect_timeout 30s;
        }

        # Страница Vue /sub/:token/open/:client — не проксировать на API (иначе 302 на тот же URL).
        location ~ ^/sub/[^/]+/open/[^/]+$ {
            try_files $uri /index.html;
        }

        # Остальное под /sub — публичное API (Base64, JSON, …/open/…/data).
        location /sub {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        # Тестовая подписка (короткий URL; иначе отдаётся SPA index.html).
        location = /test-sub {
            proxy_pass http://api:8000/test-sub;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        location = /test-happ-variants {
            proxy_pass http://api:8000/test-happ-variants;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        # FastAPI: /swagger (JWT admin|manager), схема встроена в HTML
        location /swagger {
            proxy_pass http://api:8000/swagger;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
